name: Deploy

on:
  workflow_dispatch:

jobs:
  fly-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy server to Fly.io
        run: flyctl deploy --config infra/fly.toml --dockerfile infra/Dockerfile --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  vercel-hint:
    runs-on: ubuntu-latest
    steps:
      - name: Vercel note
        run: |
          echo "Web deploys via Vercel Git integration."
          echo "Import owenkuss/odoggle with root directory apps/web."
          echo "Env: infra/env.production.web.example"
