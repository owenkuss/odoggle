name: Deploy

on:
  workflow_dispatch:

jobs:
  fly-server:
    runs-on: ubuntu-latest
    if: vars.FLY_API_TOKEN != ''
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy server
        run: flyctl deploy --config infra/fly.toml --dockerfile infra/Dockerfile
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  vercel-hint:
    runs-on: ubuntu-latest
    steps:
      - name: Vercel deploy note
        run: |
          echo "Connect this repo to Vercel with root directory apps/web."
          echo "Set env vars from infra/env.production.web.example"
