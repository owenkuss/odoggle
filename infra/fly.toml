# fly.toml — deploy from repo root:
#   fly deploy --config infra/fly.toml --dockerfile infra/Dockerfile

app = "odoggle-server"
primary_region = "iad"

[build]
  dockerfile = "infra/Dockerfile"

[env]
  PORT = "3001"
  DEV_JURY = "false"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[services]]
  protocol = "tcp"
  internal_port = 3001

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.ports]]
    handlers = ["http"]
    port = 80
