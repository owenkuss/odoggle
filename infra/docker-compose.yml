version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: odoggle
      POSTGRES_PASSWORD: odoggle
      POSTGRES_DB: odoggle
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoggle"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      WEB_ORIGIN: http://localhost:3000
      DATABASE_URL: postgresql://odoggle:odoggle@postgres:5432/odoggle
      REDIS_URL: redis://redis:6379
      DEV_JURY: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
