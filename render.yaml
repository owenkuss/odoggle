# render.yaml — free-tier API + WebSocket host
# Deploy: https://dashboard.render.com → New → Blueprint → connect owenkuss/odoggle

services:
  - type: web
    name: odoggle-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: NPM_CONFIG_PRODUCTION=false npm ci && npm run build -w @odoggle/shared && npm run build -w @odoggle/server
    startCommand: npm run start -w @odoggle/server
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: WEB_ORIGIN
        value: https://odoggle.com,https://www.odoggle.com
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
